{% extends "base.html" %}
{% block content %}
<div class="card-glass p-4">
  <h3 class="fw-bold mb-1">{{ quiz.title }}</h3>
  <div class="text-secondary mb-3">Testni yakunlang (o‘tish balli: {{ quiz.module.passing_score }})</div>

  <form method="post" class="vstack gap-3">
    {% csrf_token %}
    {% for q in questions %}
      <div class="card-glass p-3">
        <div class="fw-semibold mb-2">{{ forloop.counter }}. {{ q.text }}</div>
        {% for ch in q.choices.all %}
          <div class="form-check">
            <input class="form-check-input" type="radio" name="q_{{ q.id }}" value="{{ ch.id }}" required>
            <label class="form-check-label">{{ ch.text }}</label>
          </div>
        {% endfor %}
      </div>
    {% endfor %}
    <button class="btn btn-glass w-100">Yakunlash</button>
  </form>
</div>
{% endblock %}
