{% extends "base.html" %}
{% block content %}
<div class="join-course-wrap">
  <div class="join-course-col">
    <div class="card-glass p-4">
      <h4 class="fw-bold mb-2">Kursga qo'shilish</h4>
      <div class="text-secondary small mb-3">Kurs kodini kiriting va ism-familiyangizni tasdiqlang.</div>
      <form method="post" class="vstack gap-3">
        {% csrf_token %}
        <input name="first_name" class="form-control" placeholder="Ism" value="{{ request.user.first_name }}" required>
        <input name="last_name" class="form-control" placeholder="Familiya" value="{{ request.user.last_name }}" required>
        <input name="code" class="form-control" placeholder="Kurs kodi (masalan: A1B2C3D)" required>
        <button class="btn btn-glass w-100">Qo'shilish</button>
      </form>
      {% if msg %}<div class="alert alert-warning mt-3">{{ msg }}</div>{% endif %}
    </div>
  </div>
</div>
{% endblock %}
