{% extends "base.html" %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width: 640px;">
    <section class="card-glass p-4 auth-pane">
      <h3 class="fw-bold mb-2">Kirish</h3>
      <div class="text-secondary mb-3">Akkauntingizga kiring</div>

      {% if form.errors %}
        <div class="alert alert-warning">Username/email yoki parol noto'g'ri.</div>
      {% endif %}

      <form method="post" class="vstack gap-3 auth-form">
        {% csrf_token %}
        <div class="field">
          <label for="{{ form.username.id_for_label }}">Username yoki Email</label>
          {{ form.username }}
        </div>
        <div class="field">
          <label for="{{ form.password.id_for_label }}">Parol</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Kirish</button>
      </form>

      <p class="mt-3">
        Akkount yo'qmi? <a href="{% url 'register' %}">Ro'yxatdan o'tish</a>
      </p>
    </section>
  </div>
</div>
{% endblock %}
